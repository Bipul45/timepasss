<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Bharti Surprise ❤️</title>
<style>
body{margin:0;overflow:hidden;background:linear-gradient(135deg,#ffd6e8,#fff);font-family:cursive}
.page{display:none;height:100vh;justify-content:center;align-items:center;padding:20px}
.active{display:flex}
.card{background:rgba(255,255,255,.5);backdrop-filter:blur(12px);border-radius:25px;padding:25px;text-align:center;max-width:700px;width:90%}
.top,.bottom{font-size:28px;color:#ff3b7d;min-height:70px}
.gifbox{height:220px;border:3px dashed #ff4f8b;border-radius:20px;display:flex;align-items:center;justify-content:center;margin:15px 0;font-size:22px;color:#ff4f8b}
.btn{padding:12px 22px;border:none;border-radius:30px;background:#ff4f8b;color:#fff}
.heart{position:fixed;bottom:-20px;animation:f 6s linear infinite}
@keyframes f{to{transform:translateY(-110vh);opacity:0}}
#musicBtn{position:fixed;left:10px;top:10px;z-index:99}
</style>
</head>
<body>

<audio id="bgMusic" loop><source src="music/song.mp3"></audio>
<button id="musicBtn">🎵</button>

<div id="pages"></div>

<script>
const data=[
["Open It With A Smile 😊","",""],
["You Are My ❤️","chocopie.gif","You make every day sweeter"],
["Happiness Comes In Little Packets","gems.gif","Just like you"],
["I Give You 5 Star Rating ⭐⭐⭐⭐⭐","5star.gif","For always being there"],
["Your Love Melts Me Like","dairymilk.gif","And fills my heart"],
["You Give Refreshness In My Life Like","centerfresh.gif","Every single day"],
["I Will Never Take A Break","kitkat.gif","From our relationship ❤️"],
["But My Every Pulse Says","pulse.gif","Something special..."],
["I Love You ❤️","✨","Always And Forever... Happy Birthday Bharti 🎂"]
];

const container=document.getElementById('pages');

data.forEach((d,i)=>{
container.innerHTML+=`
<div class="page ${i===0?'active':''}">
 <div class="card">
  <div class="top" id="top${i}"></div>
  <div class="gifbox">${d[1]}</div>
  <div class="bottom" id="bottom${i}"></div><br>
  ${i<data.length-1?'<button class="btn" onclick="nextPage()">Move With Your Smile 😊</button>':''}
 </div>
</div>`;
});

let pages=document.querySelectorAll('.page');
let current=0;

function typeText(id,text,speed=60){
 let el=document.getElementById(id);
 el.innerHTML='';
 let n=0;
 function t(){
   if(n<text.length){el.innerHTML+=text.charAt(n);n++;setTimeout(t,speed);}
 }
 t();
}

function runTyping(i){
 typeText('top'+i,data[i][0]);
 typeText('bottom'+i,data[i][2]);
}
runTyping(0);

function nextPage(){
 pages[current].classList.remove('active');
 current++;
 pages[current].classList.add('active');
 runTyping(current);
}

document.body.addEventListener('click',()=>bgMusic.play(),{once:true});
musicBtn.onclick=()=>bgMusic.paused?bgMusic.play():bgMusic.pause();

setInterval(()=>{
 let h=document.createElement('div');
 h.className='heart';
 h.innerHTML='❤️';
 h.style.left=Math.random()*100+'vw';
 document.body.appendChild(h);
 setTimeout(()=>h.remove(),6000);
},400);
</script>
</body>
</html>
